<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>舞星・雅</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
      <!-- ホーム画面 -->
    <div id="screen-home" class="screen active">        
      <div class="home-container">

          <div class="form-group nickname-group">
            <label>ニックネーム</label>
            <div class="input-wrapper">
              <img src="assets/nomaluser.png" class="input-bg" alt="入力枠" />
              <input
                type="text"
                id="nickname-input"
                placeholder=""
              />
            </div>
          </div>

          <div class="button-group">
            <img id="btn-create" src="assets/roommake.png" alt="部屋を作る" />
            <img id="btn-join" src="assets/search.png" alt="部屋に入る" />
          </div>

          <!-- ホーム画面右上に表示される画像（初期は非表示） -->
          <img id="homeimg" src="assets/homeimg.png" alt="ホーム画像" style="display:none;" />

          <!-- 入室用パスワード入力（入室ボタン押したら表示） -->
          <div id="join-form" style="display: none">
            <div class="form-group password-group">
              <label>合言葉</label>
              <div class="input-wrapper">
                <img src="assets/pass.png" class="input-bg" alt="合言葉入力枠" />
                <input
                  type="text"
                  id="password-input"
                  placeholder="合言葉を入力"
                />
              </div>
            </div>
            <img id="btn-join-confirm" src="assets/in.png" alt="入室する" />
          </div>

          <div id="error-message" style="color: red"></div>
        </div>
      </div>
    </div>

    <!-- 待機室 -->
      <div id="screen-waiting" class="screen" style="display:none">
        <div class="home-container">
          <h2>待機室</h2>
          <div class="password-group waiting-password">
            <label>合言葉</label>
            <div class="input-wrapper">
              <img src="assets/pass.png" class="input-bg" alt="合言葉" />
              <div id="display-password" class="text-overlay"></div>
            </div>
          </div>
          <div id="player-list"></div>
          <div class="start-button-wrapper">
             <img id="btn-start" src="assets/startbutton.png" alt="ゲームスタート" />
          </div>
          <img id="btn-leave" src="assets/logout.png" alt="退室する" />
        </div>
      </div>

    <!-- ゲーム画面 -->
    <div id="screen-game" class="screen" style="display: none">
      <div id="game-root">
       
        <!-- ヘッダー -->
        <div id="header">
          <div id="title-text">舞　星</div>
          <div id="phase-badge">宣伝フェーズ</div>
          <div id="round-info">
            第<span id="round-num">1</span>局・<span id="turn-num">1</span>巡目<br>
            残り時間 <span id="timer">1:30</span>
          </div>
        </div>
       
        <!-- メインレイアウト -->
        <div id="main-layout">
       
          <!-- 中央エリア -->
          <div id="center-area">
       
            <!-- 相手の芸者3人 -->
            <div id="opponents">
       
              <div class="geisha-card active" id="geisha-0">
                <div class="geisha-header">
                  <div>
                    <div class="geisha-name" id="maiko-name-0">紅葉</div>
                    <div class="geisha-score" id="score-0">点数: 24点</div>
                  </div>
                </div>
                <div class="card-backs" id="hand-0"></div>
                <div class="status-badge status-seki">席中</div>
              </div>
       
              <div class="geisha-card" id="geisha-1">
                <div class="geisha-header">
                  <div>
                    <div class="geisha-name" id="maiko-name-1">雪月</div>
                    <div class="geisha-score" id="score-1">点数: 18点</div>
                  </div>
                </div>
                <div class="card-backs" id="hand-1"></div>
                <div class="status-badge status-normal">待機中</div>
              </div>
       
              <div class="geisha-card" id="geisha-2">
                <div class="geisha-header">
                  <div>
                    <div class="geisha-name" id="maiko-name-2">花音</div>
                    <div class="geisha-score" id="score-2">点数: 31点</div>
                  </div>
                </div>
                <div class="card-backs" id="hand-2"></div>
                <div class="status-badge status-normal">待機中</div>
              </div>
       
            </div><!-- /opponents -->
       
            <!-- 座敷の場 -->
            <div id="table-area">
              <div class="area-label">◆ 座敷の場</div>
              <div id="table-0">
                <div id="client-0"></div>
                <div id="ad-0"></div>
              </div>
              <div id="table-1">
                <div id="client-1"></div>
                <div id="ad-1"></div>
              </div>
              <div id="table-2">
                <div id="client-2"></div>
                <div id="ad-2"></div>
              </div>
            </div>
       
          </div><!-- /center-area -->
       
          <!-- 自分の手札エリア -->
          <div id="hand-area">
            <div id="hand-label">
              <span style="color:#8B5E2A">◈</span>
              あなたの手札（自分のみ表示）
              <span id="selected-count" style="font-size:9px;color:#9a6a40;margin-left:auto">
                選択中: 0枚
              </span>
            </div>
            <div id="my-cards"></div>
          </div>
       
          <!-- サイドバー -->
          <div id="sidebar">
       
            <!-- アクションボタン -->
            <div id="actions">
              <div class="section-title">◆ アクション</div>
              <img src="assets/kyaku.png" class="action-img-btn" id=zasiki onclick="jsActionClick('座敷')" alt="客を出す" />
              <img src="assets/api.png"   class="action-img-btn" id=senden onclick="jsActionClick('宣伝')"   alt="宣伝する" />
              <img src="assets/syokai.png"      class="action-img-btn" id=syoukai onclick="jsActionClick('紹介')"   alt="場を換える" />
              <img src="assets/yoyakukyaku.png" class="action-img-btn" id=yoyaku onclick="jsActionClick('予約客')" alt="予約客を出す" />
            </div>
       
            <!-- 行動記録ログ -->
            <div id="log-area">
              <div class="section-title">◆ 行動記録</div>
              <div id="log-list"></div>
            </div>
       
            <!-- スコアバー -->
            <div id="score-bar">
              <div class="score-item">
                <span class="score-val" id="my-score">42</span>
                <span class="score-label">あなたの小判</span>
              </div>
              <div class="score-sep"></div>
              <div class="score-item">
                <span class="score-val" id="game-progress">1/3</span>
                <span class="score-label">局数</span>
              </div>
            </div>
       
          </div><!-- /sidebar -->
        </div><!-- /main-layout -->
      </div><!-- /game-root -->
       
      <!-- なでしこ3 状態表示 -->
      <div id="nako-output">なでしこ3 起動中…</div>
       
       
      <!-- ========================================
           JavaScript：なでしこ3との橋渡し関数
           （カードクリック・ボタン処理）
      ======================================== -->
      <script>
        /**
         * カードクリック
         * なでしこ3が生成したカードのonclickから呼ばれる
         */
        function jsCardClick(el) {
          el.classList.toggle('selected');
          const count = document.querySelectorAll('#my-cards .card-face.selected').length;
          document.getElementById('selected-count').textContent = '選択中: ' + count + '枚';
        }
       
        /**
         * アクションボタンクリック
         * HTML側ボタンのonclickから呼ばれ、ログ追記などを行う
         */
function jsActionClick(action) {
  const selected = document.querySelectorAll('#my-cards .card-face.selected');

  // 座敷・宣伝・予約客用：最初の選択カードのインデックス
  window.__cardIdx = -1;
  // 紹介用：全選択カードのインデックス
  window.__cardIdxs = [];
  const cards = document.querySelectorAll('#my-cards .card-face');
  for (let i = 0; i < cards.length; i++) {
    if (cards[i].classList.contains('selected')) {
      if (window.__cardIdx === -1) window.__cardIdx = i;
      window.__cardIdxs.push(i);
    }
  }

  window.__actionType = action;
  navigator.nako3.run('アクション実行。');

  // ログ追記
  const timer = document.getElementById('timer').textContent;
  const log = document.getElementById('log-list');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  let cardName = '';
  if (selected.length > 0) {
    const val = selected[0].querySelector('.card-value');
    if (val) cardName = val.textContent;
  }
  if (action === '紹介') {
    const names = Array.from(selected).map(c => {
      const v = c.querySelector('.card-value');
      return v ? v.textContent : '';
    }).join('・');
    entry.innerHTML =
      `<span class="log-time">${timer}</span>` +
      `<span class="log-actor">あなた</span>` +
      `<span class="log-action">が</span>` +
      `<span class="log-highlight">${names}</span>` +
      `<span class="log-action">を紹介</span>`;
  } else if (cardName) {
    entry.innerHTML =
      `<span class="log-time">${timer}</span>` +
      `<span class="log-actor">あなた</span>` +
      `<span class="log-action">が</span>` +
      `<span class="log-highlight">${cardName}</span>` +
      `<span class="log-action">を${action}</span>`;
  } else {
    entry.innerHTML =
      `<span class="log-time">${timer}</span>` +
      `<span class="log-actor">あなた</span>` +
      `<span class="log-action">が${action}</span>`;
  }
  log.insertBefore(entry, log.firstChild);

  // 選択状態を解除
  selected.forEach(c => c.classList.remove('selected'));
  document.getElementById('selected-count').textContent = '選択中: 0枚';
}
        /**
         * ゲーム中のタイマー開始
         */
        let timerInterval;
        function startGameTimer(duration) {
            let timer = duration;
            const timerEl = document.getElementById('timer');
            
            // 既存タイマーのクリア
            if (timerInterval) clearInterval(timerInterval);

            // 初回表示更新
            const updateDisplay = () => {
                const minutes = Math.floor(timer / 60);
                const seconds = timer % 60;
                timerEl.textContent = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
            };
            updateDisplay();

            timerInterval = setInterval(() => {
                timer--;
                updateDisplay();

                if (timer < 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = "0:00";
                }
            }, 1000);
        }
      </script>
    </div>

    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:5001");

      function emit(action, data) {
        socket.emit(action, data);
      }

      // なでしこ3が読み込まれてから実行する
      function nakoRun(funcName) {
        if (navigator.nako3) {
          navigator.nako3.run(funcName + '。');
        } else {
          // なでしこ3がまだ読み込まれていない場合は待つ
          setTimeout(() => nakoRun(funcName), 100);
        }
      }

      socket.on("connect", () => {
        const savedRoomId = sessionStorage.getItem("myRoomId");
        const savedPlayerId = sessionStorage.getItem("myPlayerId");
        if (savedRoomId) {
          socket.emit("再接続", {
            roomId: savedRoomId,
            playerId: parseInt(savedPlayerId),
            socketId: socket.id
          });
        } else {
          nakoRun("接続完了受信");
        }
      });

      socket.on("再接続完了", (data) => {
        window.__nakoData = data;
        nakoRun("再接続完了受信");
      });

      socket.on("再接続失敗", () => {
        sessionStorage.clear();
        nakoRun("接続完了受信");
      });

      socket.on("部屋作成完了", (data) => {
        sessionStorage.setItem("myRoomId", data.roomId);
        sessionStorage.setItem("myPlayerId", data.playerId);
        sessionStorage.setItem("myPassword", data.password);
        window.__nakoData = data;
        nakoRun("部屋作成完了受信");
      });

      socket.on("入室完了", (data) => {
        sessionStorage.setItem("myRoomId", data.roomId);
        sessionStorage.setItem("myPlayerId", data.playerId);
        sessionStorage.setItem("myPassword", data.password || "");
        window.__nakoData = data;
        nakoRun("入室完了受信");
      });

      socket.on("待機室更新", (data) => {
        window.__nakoData = data;
        nakoRun("待機室更新受信");
      });

      socket.on("部屋解散", (data) => {
        sessionStorage.clear();
        window.__nakoData = data;
        nakoRun("部屋解散受信");
      });

      socket.on("ゲーム開始", (data) => {
        sessionStorage.setItem("currentScreen", "game");
        window.__nakoData = data;
        startGameTimer(90); // 1分30秒
        nakoRun("ゲーム開始受信");
      });

      socket.on('ゲーム状態更新', (data) => {
        window.__nakoData = data;
        nakoRun('ゲーム状態更新受信');
      });

      socket.on("エラー", (data) => {
        window.__nakoData = data;
        nakoRun("エラー受信");
      });
    </script>    <!-- なでしこ3 -->
    <script src="https://nadesi.com/v3/cdn.php?v=3.3.71&f=release/wnako3.js&run"></script>
    <script type="なでしこ">
      !「scripts/home.nako3」を取り込む。

  </body>
</html>
